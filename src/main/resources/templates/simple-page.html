<!DOCTYPE html>
<html lang="zh-CN" th:replace="~{layouts/public :: page(${title}, ~{::main})}">
<main>
  <section class="page-title">
    <p class="eyebrow" th:text="${eyebrow}">说明</p>
    <h1 th:text="${title}">页面标题</h1>
    <p th:text="${description}">页面说明</p>
  </section>
  <section class="section">
    <div class="topic-grid">
      <article th:each="item : ${items}">
        <h3 th:text="${item.title}">标题</h3>
        <p th:text="${item.body}">内容</p>
      </article>
    </div>
  </section>
</main>
</html>
