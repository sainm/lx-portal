<!DOCTYPE html>
<html lang="zh-CN" th:replace="~{layouts/public :: page(${title}, ~{::main})}">
<main>
  <section class="page-title">
    <p class="eyebrow" th:text="${eyebrow}">详情</p>
    <h1 th:text="${title}">标题</h1>
    <p th:text="${description}">说明</p>
    <div class="action-row">
      <a class="button" th:href="@{/appointment}" href="/appointment">预约咨询</a>
    </div>
  </section>
  <section class="section">
    <article class="detail-content">
      <div th:each="block : ${blocks}">
        <h2 th:text="${block.title}">小标题</h2>
        <p th:text="${block.body}">内容</p>
      </div>
    </article>
  </section>
</main>
</html>
