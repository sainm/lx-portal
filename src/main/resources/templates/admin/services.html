<!DOCTYPE html>
<html lang="zh-CN" th:replace="~{layouts/admin :: adminPage('服务项目管理', ~{::main})}">
<main>
  <script>
    window.AdminPageConfig = {
      resource: "services",
      title: "服务项目管理",
      description: "维护服务项目文案、SEO 信息与发布状态。",
      endpoint: "/api/admin/services",
      rowId: "id",
      createLabel: "新增服务",
      formTitle: "服务项目",
      columns: [
        { key: "name", label: "项目名称" },
        { key: "summary", label: "简介" },
        { key: "counselingMethods", label: "咨询方式" },
        { key: "sortOrder", label: "排序" },
        { key: "status", label: "状态", type: "status" },
        { key: "updatedAt", label: "更新时间", type: "datetime" }
      ],
      formFields: [
        { key: "name", label: "项目名称", required: true },
        { key: "summary", label: "简介", type: "textarea", span: 2 },
        { key: "suitableFor", label: "适合人群", type: "textarea", span: 2 },
        { key: "commonTopics", label: "常见议题", type: "textarea", span: 2 },
        { key: "counselingMethods", label: "咨询方式" },
        { key: "sortOrder", label: "排序", type: "number" },
        { key: "status", label: "状态", type: "select", options: ["DRAFT", "PUBLISHED", "ARCHIVED"] },
        { key: "seoTitle", label: "SEO 标题" },
        { key: "seoKeywords", label: "SEO 关键词" },
        { key: "seoDescription", label: "SEO 描述", type: "textarea", span: 2 }
      ]
    };
  </script>

  <section class="panel admin-resource" data-admin-resource>
    <div class="panel-header">
      <div>
        <p>服务内容</p>
        <h1>服务项目管理</h1>
      </div>
      <div class="admin-actions">
        <button class="ghost-button" type="button" data-admin-refresh>刷新</button>
        <button class="primary-button" type="button" data-admin-create>新增服务</button>
      </div>
    </div>
    <div class="admin-alert" data-admin-message hidden></div>
    <div class="table-wrap">
      <table>
        <thead data-admin-table-head></thead>
        <tbody data-admin-table-body>
          <tr><td>正在加载...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="panel admin-editor" data-admin-editor hidden>
    <div class="panel-header">
      <div>
        <p>项目编辑</p>
        <h1 data-admin-form-title>服务项目</h1>
      </div>
      <button class="ghost-button" type="button" data-admin-cancel>取消</button>
    </div>
    <form class="admin-form" data-admin-form></form>
  </section>
</main>
</html>
